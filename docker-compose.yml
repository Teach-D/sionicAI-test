services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sionicdb
      POSTGRES_USER: sionic
      POSTGRES_PASSWORD: sionic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sionic -d sionicdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/sionicdb
      DB_USERNAME: sionic
      DB_PASSWORD: sionic
      JWT_SECRET: prod-secret-key-must-be-at-least-256-bits-long-for-hs256
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
